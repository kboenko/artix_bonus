databaseChangeLog:
  - changeSet:
      id: create_bonus
      author: Konstantin Boenko
      changes:
        - createTable:
            tableName: bonus
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: amount
                  type: bigint
              - column:
                  name: operation_date
                  type: timestamp with time zone
              - column:
                  name: card_id
                  type: bigint
                  constraints:
                    foreignKeyName: card_bonus_fk
                    referencedTableName: card
                    referencedColumnNames: id