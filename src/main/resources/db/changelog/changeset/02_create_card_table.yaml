databaseChangeLog:
  - changeSet:
      id: create_card
      author: Konstantin Boenko
      changes:
        - createTable:
            tableName: card
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: number
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: card_user_id
                  type: bigint
                  constraints:
                    foreignKeyName: card_user_card_fk
                    referencedTableName: card_user
                    referencedColumnNames: id

