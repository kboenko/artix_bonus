databaseChangeLog:
  - changeSet:
      id: create-card-user
      author: Konstantin Boenko
      changes:
        - createTable:
            tableName: card_user
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: first_name
                  type: varchar(30)
              - column:
                  name: second_name
                  type: varchar(30)
              - column:
                  name: last_name
                  type: varchar(30)
              - column:
                  name: role
                  type: varchar(10)