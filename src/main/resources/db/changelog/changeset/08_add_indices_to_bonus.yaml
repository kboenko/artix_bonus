databaseChangeLog:
  - changeSet:
      id: add_indices_to_bonus
      author: Konstantin Boenko
      changes:
        - createIndex:
            indexName: idx_bonus_id
            tableName: bonus
            unique: true
            columns:
              - column: {name: id}
        - createIndex:
            indexName: idx_bonus_card_id
            tableName: bonus
            unique: true
            columns:
              - column: {name: card_id}